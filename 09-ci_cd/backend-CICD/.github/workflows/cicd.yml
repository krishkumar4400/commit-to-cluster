name: Node.js CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Backup .env
        run: |
          if [ -f ~/app/.env ]; then
            cp ~/app/.env /tmp/env_backup
          fi

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore .env
        run: |
          if [ -f /tmp/env_backup ]; then
            cp /tmp/env_backup .env
          fi

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Restart Server
        run: pm2 restart server || pm2 start server.js --name server
        